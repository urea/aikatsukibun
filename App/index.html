<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>アイカツ！気分</title>
    <!-- Google Fontsの読み込み (Outfit & M PLUS Rounded 1c) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- 全体のコンテナ (スマホ縦画面前提 - 初期テーマはクール) -->
    <div id="app" class="theme-cool">
      <!-- 上部：タイトル & 楽曲セレクト (10%) -->
      <header class="header">
        <h1 class="brand-title">アイカツ！気分</h1>
        <div class="song-select-wrapper">
          <select id="song-select" class="song-select">
            <option value="cool_glass" selected>🎵 硝子ドール</option>
            <option value="cute_katsudo">🎵 アイドル活動！</option>
            <option value="pop_happy">🎵 ダイヤHappy</option>
          </select>
        </div>
      </header>

      <!-- 中央：YOUTUBE動画表示エリア (30%) -->
      <section class="video-area">
        <div class="video-container">
          <iframe 
            id="youtube-player"
            src="https://www.youtube.com/embed/fYibOFCMpnE?enablejsapi=1" 
            title="プレイ動画" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
          </iframe>
        </div>
      </section>

      <!-- 下部：タップエリア (40%) -->
      <section class="tap-area">
        <!-- 背景のパーティクルエフェクト描画用コンテナ -->
        <div id="sparkle-container" class="sparkle-container"></div>
        
        <div class="triangle-container">
          <div class="button btn-red" id="btn-red">
            <span class="btn-inner"></span>
          </div>
          <div class="button btn-green" id="btn-green">
            <span class="btn-inner"></span>
          </div>
          <div class="button btn-yellow" id="btn-yellow">
            <span class="btn-inner"></span>
          </div>
        </div>
      </section>

      <!-- 空白エリア (20%) -->
      <footer class="footer-area">
        <div class="audience-glow"></div>
      </footer>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
